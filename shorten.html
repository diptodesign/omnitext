<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener · OmniTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --primary: #f59e0b; --primary-dark: #d97706; }
    body { font-family:"Inter",sans-serif; background:#f0f5fe; min-height:100vh; display:flex; flex-direction:column; }
    .site-header { background:rgba(255,255,255,0.65); backdrop-filter:blur(16px); padding:0.9rem 0; border-bottom:1px solid rgba(245,158,11,0.2); }
    .header-container { max-width:1000px; margin:0 auto; padding:0 1.8rem; display:flex; align-items:center; justify-content:space-between; }
    .logo { display:flex; align-items:center; gap:0.75rem; }
    .logo-icon { background:linear-gradient(145deg, var(--primary-dark), var(--primary)); width:2.8rem; height:2.8rem; border-radius:0.9rem; display:flex; align-items:center; justify-content:center; color:white; font-size:1.6rem; font-weight:700; }
    .logo-text { font-weight:700; font-size:1.5rem; color:#0f2b4b; }
    .main-nav a { text-decoration:none; color:#1e3a6f; margin-left:2rem; font-weight:500; }
    .main-content { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { max-width:700px; width:100%; background:rgba(255,255,255,0.75); backdrop-filter:blur(18px); border-radius:2rem; padding:2.5rem; box-shadow:0 25px 50px -10px rgba(0,0,0,0.15); border:1px solid rgba(255,255,255,0.6); }
    h1 { margin-bottom:1.5rem; display:flex; align-items:center; gap:0.5rem; }
    .input-group { display:flex; gap:0.5rem; margin-bottom:1.5rem; }
    input { flex:1; padding:1rem 1.5rem; border-radius:60px; border:1.8px solid #d7e2f5; font-size:1rem; background:white; }
    button { background:var(--primary); border:none; padding:1rem 2rem; border-radius:60px; color:white; font-weight:600; cursor:pointer; transition:0.2s; display:flex; align-items:center; gap:0.5rem; }
    button:hover { background:var(--primary-dark); transform:translateY(-2px); }
    button:disabled { opacity:0.6; pointer-events:none; }
    .result { background:white; border-radius:1rem; padding:1.2rem; display:flex; align-items:center; justify-content:space-between; border:1px solid #e2e8f0; margin-top:1rem; }
    .result a { color:var(--primary-dark); text-decoration:none; font-weight:500; word-break:break-all; }
    .copy-btn { background:none; border:none; color:var(--primary); cursor:pointer; font-size:1.2rem; padding:0.5rem; }
    .error { color:#dc2626; margin-top:1rem; }
    .footer-ad { margin-top:2rem; background:rgba(240,244,254,0.6); backdrop-filter:blur(8px); border-radius:1rem; padding:1rem; text-align:center; border:1px dashed #a0bbdf; }
    .ad-label { background:#fff; padding:2px 10px; border-radius:30px; font-size:0.75rem; text-transform:uppercase; margin-right:8px; }
    .site-footer { background:rgba(255,255,255,0.4); backdrop-filter:blur(8px); padding:1.5rem; border-top:1px solid rgba(245,158,11,0.1); }
    .footer-container { max-width:1000px; margin:0 auto; display:flex; justify-content:space-between; }
    .dipto-brand { background:rgba(245,158,11,0.05); padding:0.3rem 1rem; border-radius:40px; display:inline-flex; align-items:center; gap:6px; }
    .powered-by { font-size:0.8rem; color:#64748b; margin-top:0.5rem; }
  </style>
</head>
<body>
<header class="site-header">
  <div class="header-container">
    <div class="logo">
      <div class="logo-icon">🔗</div>
      <div class="logo-text">Short<span style="font-weight:400;">URL</span></div>
    </div>
    <nav class="main-nav">
      <a href="#">Tools</a>
      <a href="#">Privacy</a>
    </nav>
  </div>
</header>
<main class="main-content">
  <div class="card">
    <h1><i class="fas fa-link" style="color:#f59e0b;"></i> URL Shortener</h1>
    <p style="color:#476085; margin-bottom:1.5rem;">Paste a long URL, get a short dd.sh link instantly.</p>
    
    <div class="input-group">
      <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" value="">
      <button id="shortenBtn"><i class="fas fa-compress-alt"></i> Shorten</button>
    </div>
    
    <div id="resultContainer" style="display:none;">
      <div class="result">
        <a href="#" target="_blank" id="shortUrl">https://dd.sh/xxxx</a>
        <button class="copy-btn" id="copyShortBtn" title="Copy to clipboard"><i class="far fa-copy"></i></button>
      </div>
    </div>
    
    <div id="errorMsg" class="error"></div>
    
    <div class="powered-by">
      <i class="fas fa-bolt"></i> Powered by dd.sh
    </div>

    <div class="footer-ad">
      <span class="ad-label">Ad</span> 
      <span>✨ Your advertisement here — AdSense ready ✨</span>
    </div>
  </div>
</main>
<footer class="site-footer">
  <div class="footer-container">
    <div>© 2026 · <span class="dipto-brand"><i class="fas fa-paint-brush"></i> Dipto Design LLC</span></div>
    <div><a href="#">Privacy</a> · <a href="#">Terms</a> · <a href="#">Contact</a></div>
  </div>
</footer>
<script>
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('shortenBtn');
  const resultDiv = document.getElementById('resultContainer');
  const shortLink = document.getElementById('shortUrl');
  const errorMsg = document.getElementById('errorMsg');

  async function shorten() {
    let url = input.value.trim();
    if (!url) {
      errorMsg.textContent = 'Please enter a URL';
      return;
    }
    
    // Add protocol if missing
    if (!/^https?:\/\//i.test(url)) {
      url = 'https://' + url;
    }

    errorMsg.textContent = '';
    resultDiv.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Shortening...';

    try {
      // dd.sh API: POST with form data "url"
      const formData = new FormData();
      formData.append('url', url);

      const response = await fetch('https://dd.sh/', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        throw new Error(`HTTP error ${response.status}`);
      }

      const shortUrl = await response.text();
      
      // dd.sh returns the short URL as plain text
      if (shortUrl && shortUrl.startsWith('https://dd.sh/')) {
        shortLink.href = shortUrl;
        shortLink.textContent = shortUrl;
        resultDiv.style.display = 'block';
      } else {
        throw new Error('Invalid response from dd.sh');
      }
    } catch (e) {
      errorMsg.textContent = 'Failed to shorten URL. Please try again.';
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-compress-alt"></i> Shorten';
    }
  }

  btn.addEventListener('click', shorten);
  
  document.getElementById('copyShortBtn').addEventListener('click', () => {
    const url = shortLink.textContent;
    navigator.clipboard?.writeText(url).then(() => {
      // Temporary feedback
      const btn = document.getElementById('copyShortBtn');
      btn.innerHTML = '<i class="fas fa-check"></i>';
      setTimeout(() => btn.innerHTML = '<i class="far fa-copy"></i>', 1500);
    }).catch(() => {
      alert('Copied: ' + url);
    });
  });

  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') shorten();
  });

  // Pre-fill with example if empty (optional)
  if (!input.value) {
    input.value = 'https://github.com/features';
  }
</script>
</body>
</html>
