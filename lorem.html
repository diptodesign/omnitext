<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorem Ipsum Generator · OmniTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --primary: #8b5cf6; --primary-dark: #7c3aed; }
    body { font-family:"Inter",sans-serif; background:#f0f5fe; min-height:100vh; display:flex; flex-direction:column; }
    .site-header { background:rgba(255,255,255,0.65); backdrop-filter:blur(16px); padding:0.9rem 0; border-bottom:1px solid rgba(139,92,246,0.2); }
    .header-container { max-width:1000px; margin:0 auto; padding:0 1.8rem; display:flex; align-items:center; justify-content:space-between; }
    .logo { display:flex; align-items:center; gap:0.75rem; }
    .logo-icon { background:linear-gradient(145deg, var(--primary-dark), var(--primary)); width:2.8rem; height:2.8rem; border-radius:0.9rem; display:flex; align-items:center; justify-content:center; color:white; font-size:1.6rem; font-weight:700; }
    .logo-text { font-weight:700; font-size:1.5rem; color:#0f2b4b; }
    .main-content { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { max-width:800px; width:100%; background:rgba(255,255,255,0.75); backdrop-filter:blur(18px); border-radius:2rem; padding:2.5rem; }
    h1 { margin-bottom:1.5rem; }
    .controls { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .control-group { display:flex; align-items:center; gap:0.5rem; background:#fff; padding:0.5rem 1rem; border-radius:40px; border:1px solid #e2e8f0; }
    .control-group input { width:70px; border:none; padding:0.5rem; font-size:1rem; text-align:center; }
    button { background:var(--primary); border:none; padding:0.8rem 1.8rem; border-radius:60px; color:white; font-weight:600; cursor:pointer; }
    button:hover { background:var(--primary-dark); }
    textarea { width:100%; height:250px; padding:1.5rem; border-radius:1.5rem; border:2px solid #d7e2f5; font-family:inherit; resize:vertical; margin:1.5rem 0; }
    .copy-btn { background:white; color:var(--primary); border:1px solid #d0e0f0; margin-left:1rem; }
    .footer-ad { margin-top:1rem; background:rgba(240,244,254,0.6); border-radius:1rem; padding:1rem; text-align:center; border:1px dashed #a0bbdf; }
    .site-footer { background:rgba(255,255,255,0.4); backdrop-filter:blur(8px); padding:1.5rem; border-top:1px solid rgba(139,92,246,0.1); }
    .footer-container { max-width:1000px; margin:0 auto; display:flex; justify-content:space-between; }
    .dipto-brand { background:rgba(139,92,246,0.05); padding:0.3rem 1rem; border-radius:40px; }
  </style>
</head>
<body>
<header class="site-header">
  <div class="header-container">
    <div class="logo">
      <div class="logo-icon">📄</div>
      <div class="logo-text">Lorem<span style="font-weight:400;">Ipsum</span></div>
    </div>
  </div>
</header>
<main class="main-content">
  <div class="card">
    <h1><i class="fas fa-paragraph" style="color:#8b5cf6;"></i> Lorem Ipsum Generator</h1>
    <div class="controls">
      <div class="control-group">
        <span>Paragraphs</span>
        <input type="number" id="paraCount" min="1" max="20" value="3">
      </div>
      <button id="generateBtn"><i class="fas fa-sync-alt"></i> Generate</button>
      <button class="copy-btn" id="copyBtn"><i class="far fa-copy"></i> Copy</button>
    </div>
    <textarea id="output" readonly>Lorem ipsum dolor sit amet, consectetur adipiscing elit...</textarea>
    <div class="footer-ad"><span class="ad-label">Ad</span> AdSense Ready</div>
  </div>
</main>
<footer class="site-footer">
  <div class="footer-container">
    <div>© 2026 · <span class="dipto-brand"><i class="fas fa-paint-brush"></i> Dipto Design LLC</span></div>
    <div><a href="#">Privacy</a> · <a href="#">Terms</a></div>
  </div>
</footer>
<script>
  const loremWords = ['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','ut','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','ut','aliquip','ex','ea','commodo','consequat','duis','aute','irure','dolor','in','reprehenderit','in','voluptate','velit','esse','cillum','dolore','eu','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','in','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum'];
  function generateParagraphs(count) {
    let text = '';
    for(let p=0; p<count; p++){
      let para = '';
      const sentences = Math.floor(Math.random()*3)+4;
      for(let s=0; s<sentences; s++){
        const words = Math.floor(Math.random()*10)+8;
        let sentence = '';
        for(let w=0; w<words; w++){
          sentence += loremWords[Math.floor(Math.random()*loremWords.length)] + ' ';
        }
        sentence = sentence.charAt(0).toUpperCase() + sentence.slice(1).trim() + '. ';
        para += sentence;
      }
      text += para + '\n\n';
    }
    return text.trim();
  }
  const output = document.getElementById('output');
  const paraInput = document.getElementById('paraCount');
  function generate(){
    output.value = generateParagraphs(parseInt(paraInput.value));
  }
  generate();
  document.getElementById('generateBtn').addEventListener('click', generate);
  document.getElementById('copyBtn').addEventListener('click', ()=>{
    output.select(); document.execCommand('copy'); alert('Copied!');
  });
</script>
</body>
</html>
