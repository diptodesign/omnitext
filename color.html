<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Picker · OmniTools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1; --primary-dark: #4f46e5;
      --bg-gradient-start: #f0f5fe; --text-dark: #0b1e33;
    }
    body {
      font-family: "Inter", sans-serif; background: var(--bg-gradient-start);
      background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 30%);
      min-height: 100vh; display: flex; flex-direction: column; color: var(--text-dark);
      line-height: 1.5; -webkit-font-smoothing: antialiased;
    }
    .site-header {
      background: rgba(255,255,255,0.65); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(99,102,241,0.12); padding: 0.9rem 0;
    }
    .header-container {
      max-width: 1200px; margin: 0 auto; padding: 0 1.8rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-icon {
      background: linear-gradient(145deg, var(--primary-dark), var(--primary));
      width: 2.8rem; height: 2.8rem; border-radius: 0.9rem; display: flex;
      align-items: center; justify-content: center; color: white; font-size: 1.6rem;
      font-weight: 700; box-shadow: 0 8px 14px -6px rgba(99,102,241,0.3);
    }
    .logo-text { font-weight: 700; font-size: 1.5rem; color: #0f2b4b; }
    .main-nav a { text-decoration: none; color: #1e3a6f; margin-left: 2rem; font-weight: 500; }
    .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card {
      max-width: 800px; width: 100%; background: rgba(255,255,255,0.75);
      backdrop-filter: blur(18px); border-radius: 2rem; box-shadow: 0 25px 50px -10px rgba(0,0,0,0.15);
      padding: 2.5rem; border: 1px solid rgba(255,255,255,0.6);
    }
    h1 { font-weight: 700; margin-bottom: 1.5rem; display: flex; gap: 0.5rem; }
    .picker-area { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .color-preview {
      width: 150px; height: 150px; border-radius: 1.5rem; background: #6366f1;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 3px solid white;
    }
    .color-inputs { flex: 1; }
    input[type="color"] { width: 100%; height: 60px; border: none; border-radius: 1rem; cursor: pointer; }
    .value-box {
      background: white; border-radius: 1rem; padding: 1rem; margin: 1rem 0;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid #e2e8f0;
    }
    .value-box code { font-family: monospace; font-size: 1.2rem; }
    .copy-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 1.2rem; }
    .sliders { margin-top: 1.5rem; }
    .slider-group { margin-bottom: 1rem; }
    .slider-group label { display: flex; justify-content: space-between; }
    input[type="range"] { width: 100%; }
    .footer-ad {
      margin-top: 2rem; background: rgba(240,244,254,0.6); backdrop-filter: blur(8px);
      border: 1px dashed #a0bbdf; border-radius: 1rem; padding: 1rem; text-align: center;
    }
    .site-footer {
      background: rgba(255,255,255,0.4); backdrop-filter: blur(8px);
      padding: 1.5rem; border-top: 1px solid rgba(99,102,241,0.1);
    }
    .footer-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; }
    .dipto-brand { background: rgba(99,102,241,0.05); padding: 0.3rem 1rem; border-radius: 40px; }
  </style>
</head>
<body>
<header class="site-header">
  <div class="header-container">
    <div class="logo">
      <div class="logo-icon">🎨</div>
      <div class="logo-text">Color<span style="font-weight:400;">Picker</span></div>
    </div>
    <nav class="main-nav">
      <a href="#">Tools</a>
      <a href="#">Privacy</a>
    </nav>
  </div>
</header>
<main class="main-content">
  <div class="card">
    <h1><i class="fas fa-palette" style="color:#6366f1;"></i> Color Picker & Converter</h1>
    <div class="picker-area">
      <div class="color-preview" id="preview"></div>
      <div class="color-inputs">
        <input type="color" id="colorPicker" value="#6366f1">
        <div class="value-box">
          <code id="hexValue">#6366F1</code>
          <button class="copy-btn" data-target="hexValue"><i class="far fa-copy"></i></button>
        </div>
        <div class="value-box">
          <code id="rgbValue">rgb(99, 102, 241)</code>
          <button class="copy-btn" data-target="rgbValue"><i class="far fa-copy"></i></button>
        </div>
        <div class="value-box">
          <code id="hslValue">hsl(239, 84%, 67%)</code>
          <button class="copy-btn" data-target="hslValue"><i class="far fa-copy"></i></button>
        </div>
      </div>
    </div>
    <div class="sliders">
      <div class="slider-group">
        <label>R <span id="rVal">99</span></label>
        <input type="range" id="rSlider" min="0" max="255" value="99">
      </div>
      <div class="slider-group">
        <label>G <span id="gVal">102</span></label>
        <input type="range" id="gSlider" min="0" max="255" value="102">
      </div>
      <div class="slider-group">
        <label>B <span id="bVal">241</span></label>
        <input type="range" id="bSlider" min="0" max="255" value="241">
      </div>
    </div>
    <div class="footer-ad">
      <span class="ad-label" style="background:#fff; padding:2px 10px; border-radius:30px;">Ad</span> AdSense Ready
    </div>
  </div>
</main>
<footer class="site-footer">
  <div class="footer-container">
    <div>© 2026 · <span class="dipto-brand"><i class="fas fa-paint-brush"></i> Dipto Design LLC</span></div>
    <div><a href="#">Privacy</a> · <a href="#">Terms</a></div>
  </div>
</footer>
<script>
  const picker = document.getElementById('colorPicker');
  const preview = document.getElementById('preview');
  const hexSpan = document.getElementById('hexValue');
  const rgbSpan = document.getElementById('rgbValue');
  const hslSpan = document.getElementById('hslValue');
  const rSlider = document.getElementById('rSlider');
  const gSlider = document.getElementById('gSlider');
  const bSlider = document.getElementById('bSlider');
  const rVal = document.getElementById('rVal');
  const gVal = document.getElementById('gVal');
  const bVal = document.getElementById('bVal');

  function rgbToHsl(r,g,b){
    r/=255; g/=255; b/=255;
    let max=Math.max(r,g,b), min=Math.min(r,g,b);
    let h,s,l=(max+min)/2;
    if(max===min) h=s=0;
    else{
      let d=max-min; s=l>0.5? d/(2-max-min): d/(max+min);
      switch(max){
        case r: h=(g-b)/d+(g<b?6:0); break;
        case g: h=(b-r)/d+2; break;
        case b: h=(r-g)/d+4; break;
      }
      h/=6;
    }
    return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
  }

  function updateFromRgb(r,g,b){
    preview.style.backgroundColor = `rgb(${r},${g},${b})`;
    const hex = '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0').toUpperCase()).join('');
    hexSpan.textContent = hex;
    rgbSpan.textContent = `rgb(${r}, ${g}, ${b})`;
    const [h,s,l] = rgbToHsl(r,g,b);
    hslSpan.textContent = `hsl(${h}, ${s}%, ${l}%)`;
    picker.value = hex;
    rSlider.value = r; gSlider.value = g; bSlider.value = b;
    rVal.textContent = r; gVal.textContent = g; bVal.textContent = b;
  }

  function updateFromPicker(hex){
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    updateFromRgb(r,g,b);
  }

  picker.addEventListener('input', e=> updateFromPicker(e.target.value));
  rSlider.addEventListener('input', e=>{ updateFromRgb(+e.target.value, +gSlider.value, +bSlider.value); });
  gSlider.addEventListener('input', e=>{ updateFromRgb(+rSlider.value, +e.target.value, +bSlider.value); });
  bSlider.addEventListener('input', e=>{ updateFromRgb(+rSlider.value, +gSlider.value, +e.target.value); });

  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.target;
      const text = document.getElementById(id).textContent;
      navigator.clipboard?.writeText(text);
      alert('Copied: '+text);
    });
  });
  // initial
  updateFromPicker('#6366f1');
</script>
</body>
</html>
